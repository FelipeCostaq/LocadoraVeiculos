name: Deploy API Locadora

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Docker Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      
      - name: Build and Push Docker
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/api-locadora:${{ github.run_id }} .
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/api-locadora:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/api-locadora:${{ github.run_id }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/api-locadora:latest
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Container App
        run: az containerapp update --name api-locadora-veiculos --resource-group DefaultResourceGroup-EUS --image ${{ secrets.ACR_LOGIN_SERVER }}/api-locadora:${{ github.run_id }}